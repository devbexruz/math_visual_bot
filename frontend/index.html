<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      #favicon * {
        color: var(--primary);
      }
    </style>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" id="favicon"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Math Visual AI</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        // Telegram header va background rangini ilova rangiga moslashtirish
        if (tg.setHeaderColor) tg.setHeaderColor('#050505');
        if (tg.setBackgroundColor) tg.setBackgroundColor('#050505');
        if (tg.setBottomBarColor) tg.setBottomBarColor('#050505');
    </script>
  </body>
</html>
