<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathVisualBot - Plane Equation</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui-container { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        .label { background: rgba(0,0,0,0.8); padding: 10px 15px; border-radius: 8px; pointer-events: auto; border: 1px solid #444; }
        .equation { font-style: italic; color: #00ff88; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="label">
            <div>Tekislikning umumiy tenglamasi:</div>
            <div id="equation-text" class="equation">1x + 1y + 1z + 0 = 0</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        // 1. SAHNA
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. YORDAMCHI ELEMENTLAR
        const grid = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
        scene.add(grid);
        const axes = new THREE.AxesHelper(5);
        scene.add(axes);

        // 3. TEKISLIK (MESH)
        const geometry = new THREE.PlaneGeometry(10, 10, 10, 10);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x00ff88, 
            side: THREE.DoubleSide, 
            transparent: true, 
            opacity: 0.7,
            wireframe: false 
        });
        const plane = new THREE.Mesh(geometry, material);
        scene.add(plane);

        // Yoritgichlar
        const light = new THREE.PointLight(0xffffff, 100);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        camera.position.set(10, 10, 10);
        const controls = new OrbitControls(camera, renderer.domElement);

        // 4. MATEMATIK HISOB-KITOB
        const params = { A: 1, B: 1, C: 1, D: 0 };
        const equationDisplay = document.getElementById('equation-text');

        function updatePlane() {
            // Normal vektorni aniqlash (A, B, C)
            const normal = new THREE.Vector3(params.A, params.B, params.C);
            
            // Tekislik yo'nalishini normalga moslash
            const lookAtPoint = new THREE.Vector3().addVectors(plane.position, normal);
            plane.lookAt(lookAtPoint);

            // D koeffitsiyent bo'yicha masofani aniqlash
            // Masofa: d = |D| / sqrt(A^2 + B^2 + C^2)
            const length = normal.length();
            if (length !== 0) {
                const distance = -params.D / length;
                const moveVec = normal.clone().normalize().multiplyScalar(distance);
                plane.position.copy(moveVec);
            }

            // Matnni yangilash
            equationDisplay.innerText = `${params.A}x + ${params.B}y + ${params.C}z + ${params.D} = 0`;
        }

        // 5. GUI NAZORATI
        const gui = new GUI({ title: 'Tenglama Koeffitsiyentlari' });
        gui.add(params, 'A', -5, 5).onChange(updatePlane);
        gui.add(params, 'B', -5, 5).onChange(updatePlane);
        gui.add(params, 'C', -5, 5).onChange(updatePlane);
        gui.add(params, 'D', -10, 10).onChange(updatePlane);
        gui.addColor({ color: '#00ff88' }, 'color').onChange(val => material.color.set(val));
        gui.add(material, 'wireframe');

        updatePlane(); // Dastlabki hisob

        // Render loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
